<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Velnoxa</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <style>
        .admin-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        .admin-box { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        .admin-box h3 { margin-bottom: 20px; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #475569; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; box-sizing: border-box; }
        .admin-btn { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .admin-btn:hover { background: #1d4ed8; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-card h4 { margin: 0; color: #64748b; font-size: 13px; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: 800; color: #0f172a; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-top-row">
                <div class="nav-left">
                    <a href="../index.html" class="logo"><img src="../images/logo.png" alt="Velnoxa Logo"></a>
                </div>
                <div class="nav-right">
                    <a href="../index.html" class="nav-icon-link">🏠 <span class="nav-text">Home</span></a>
                    <a href="profile.html" class="nav-icon-link">👤 <span class="nav-text">Profile</span></a>
                </div>
            </div>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-box">
            <h3>📊 Store Overview</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Orders</h4>
                    <p id="total-orders-count">0</p>
                </div>
                <div class="stat-card">
                    <h4>Total Sales</h4>
                    <p id="total-sales-amount">₹0</p>
                </div>
            </div>
            
            <h3>📦 Recent Customer Orders</h3>
            <div id="admin-orders-list" style="font-size: 14px; line-height: 1.6; max-height: 250px; overflow-y: auto;">
                </div>
        </div>

        <div class="admin-box">
            <h3>➕ Add New Product</h3>
            <form id="add-product-form">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" required placeholder="e.g. Premium Wireless Mouse">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="prod-category">
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Groceries">Groceries</option>
                        <option value="Mobiles">Mobiles</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="prod-price" required placeholder="e.g. 999">
                </div>
               <div class="form-group">
                    <label>Product Image File</label>
                    <input type="file" id="prod-image" accept="image/*" required>
                </div>
                <button type="submit" class="admin-btn">🚀 Add Product to Store</button>
            </form>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
