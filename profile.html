<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Velnoxa</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .profile-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        
        /* Left Sidebar: User Details & Actions */
        .profile-sidebar { flex: 1; min-width: 280px; background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; height: fit-content; }
        .user-avatar { width: 90px; height: 90px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; font-size: 38px; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 15px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .profile-sidebar h2 { margin: 0; color: #0f172a; font-size: 22px; font-weight: 700; }
        .profile-sidebar .mobile-num { color: #64748b; font-size: 14px; margin: 5px 0 20px; font-weight: 500; }
        
        /* Edit Profile / Info Fields */
        .info-fields { text-align: left; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .info-group { margin-bottom: 15px; }
        .info-group label { display: block; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 5px; }
        .info-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; background: #f8fafc; box-sizing: border-box; }
        .info-group input:focus { border-color: #2563eb; background: #fff; }
        
        .save-btn { background: #2563eb; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 5px; transition: 0.2s; }
        .save-btn:hover { background: #1d4ed8; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; margin-top: 20px; transition: 0.2s; }
        .logout-btn:hover { background: #dc2626; }

        /* Right Content: Order History */
        .profile-content { flex: 2; min-width: 320px; }
        .profile-content h3 { font-size: 20px; color: #1e293b; margin: 0 0 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; font-weight: 700; }
        
        .order-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.01); }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #e2e8f0; padding-bottom: 12px; margin-bottom: 12px; font-size: 14px; color: #475569; }
        .order-header strong { color: #0f172a; }
        .order-status { background: #dcfce7; color: #166534; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .order-items-list { font-size: 14px; color: #334155; line-height: 1.6; }
    </style>
</head>
<body>

<header>
        <nav class="navbar">
            <div class="nav-top-row">
                <div class="nav-left">
                    <a href="../index.html" class="logo">
                        <img src="../images/logo.png" alt="Velnoxa Logo">
                    </a>
                </div>

                <div class="nav-right">
                    <a href="../index.html" class="nav-icon-link">🏠 <span class="nav-text">Home</span></a>
                    <a href="profile.html" class="nav-icon-link">👤 <span class="nav-text">Profile</span></a> 
                    <a href="wishlist.html" class="nav-icon-link">❤️ <span class="nav-text">Wishlist</span></a>
                    <a href="cart.html" class="nav-icon-link">🛒 <span id="cart-count">0</span></a>
                </div>
            </div>

            <div class="nav-search-row">
                <select id="cat-select">
                    <option>All</option>
                    <option>Fashion</option>
                    <option>Groceries</option>
                    <option>Electronics</option>
                    <option>Mobiles</option>
                </select>
                <input type="text" placeholder="Search products, brands and more...">
                <button type="button">🔍</button>
            </div>
        </nav>
    </header>

    <div class="profile-container">
        <div class="profile-sidebar">
            <div class="user-avatar" id="avatar-letter">V</div>
            <div class="user-avatar" id="avatar-letter" style="background-size: cover; background-position: center;">V</div>
            
            <label for="photo-upload" style="cursor: pointer; color: #2563eb; font-size: 13px; font-weight: bold; display: block; margin-bottom: 15px;">
                📷 Upload Photo
            </label>
            <input type="file" id="photo-upload" accept="image/*" style="display: none;">
            <h2 id="profile-name">Guest User</h2>
            <p class="mobile-num" id="profile-mobile">📲 +91 ----------</p>
            
            <div class="info-fields">
                <div class="info-group">
                    <label>Edit Full Name</label>
                    <input type="text" id="profile-edit-name" placeholder="Enter your full name">
                </div>
                <button class="save-btn" id="save-name-btn">Update Name</button>
            </div>
            
            <button class="logout-btn" id="logout-btn">🔒 Logout Account</button>
        </div>

        <div class="profile-content">
            <h3>📦 My Order History</h3>
            <div id="orders-container">
                </div>
        </div>
    </div>

    <script src="../js/cart.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
