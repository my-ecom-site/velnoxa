<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Velnoxa</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <style>
        .wishlist-page { padding: 40px 20px; max-width: 1200px; margin: 0 auto; min-height: 70vh;}
        .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .empty-wish { text-align: center; padding: 50px 0; color: #64748b; grid-column: 1 / -1;}
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
           <div class="nav-left">
    <a href="../index.html" class="logo">
        <img src="../images/logo.png" alt="Velnoxa Logo">
    </a>
</div>
            
       <div class="nav-right">
    <a href="../index.html" class="nav-icon-link">🏠 <span class="nav-text">Home</span></a>
    
    <a href="profile.html" class="nav-icon-link">👤 <span class="nav-text">Profile</span></a> 
    <a href="wishlist.html" class="nav-icon-link">❤️ <span class="nav-text">Wishlist</span></a>
    <a href="cart.html" class="nav-icon-link">🛒 <span id="cart-count">0</span></a>
</div>
        </nav>
    </header>

    <div class="wishlist-page">
        <h2>❤️ My Saved Wishlist</h2>
        <div id="wishlist-container" class="wishlist-grid">
            </div>
    </div>

    <script src="../js/cart.js"></script>
    
    <script>
        // Wishlist page par item render karne ka script
        function renderWishlistPage() {
            const container = document.getElementById("wishlist-container");
            let savedItems = JSON.parse(localStorage.getItem("velnoxa_wishlist")) || [];
            
            if (savedItems.length === 0) {
                container.innerHTML = `<div class="empty-wish"><h3>Your wishlist is empty! 🤍</h3><p>Add items you like to save them here.</p></div>`;
                return;
            }

            container.innerHTML = "";
            savedItems.forEach(product => {
                container.innerHTML += `
                <div class="trend-card" style="border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; text-align: center; background: #fff;">
                    <img src="../${product.image}" alt="${product.name}" style="width: 100%; height: 150px; object-fit: contain;">
                    <h3 style="margin: 10px 0; font-size: 16px; color: #1e293b;">${product.name}</h3>
                    <p class="price" style="font-weight: bold; font-size: 18px; color: #0f172a; margin-bottom: 15px;">₹${product.price}</p>
                    <button onclick="removeFromWishPage(${product.id})" style="background: #ef4444; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: 600;">Remove</button>
                </div>`;
            });
        }

        // Item ko remove karne ka logic
        function removeFromWishPage(id) {
            let savedItems = JSON.parse(localStorage.getItem("velnoxa_wishlist")) || [];
            savedItems = savedItems.filter(item => item.id !== id);
            localStorage.setItem("velnoxa_wishlist", JSON.stringify(savedItems));
            renderWishlistPage(); // Page ko turant refresh karna bina reload kiye
        }

        // Page load hone par items dikhana
        document.addEventListener("DOMContentLoaded", renderWishlistPage);
    </script>
    
</body>
</html>
